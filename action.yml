name: "AWS Stack Outputs to Env"
description: |
  Collect variables from specified stack outputs and export them to env vars

branding:
  icon: "settings"
  color: "orange"

inputs:
  access_key_id:
    description: "AWS Access Key ID (optional if an active AWS session is already configured, e.g. via OIDC)"
    required: false
  secret_access_key:
    description: "AWS Secret Access Key (optional if an active AWS session is already configured, e.g. via OIDC)"
    required: false
  session_token:
    description: "AWS Session Token (required when using temporary credentials, e.g. from STS or OIDC)"
    required: false
  region:
    description: "AWS Region"
    required: true
  stack_name:
    description: "Cloudformation Stack Name"
    required: true
  prefix:
    description: "Optional prefix for exported environment variable names. Must be uppercase letters only (e.g. MYPREFIX exports MYPREFIX_my_var)"
    required: false

runs:
  using: "composite"
  steps:
    - name: Get Stack Outputs
      id: get_stack_outputs
      shell: bash
      run: |
        if [ -n "$INPUT_PREFIX" ] && [[ ! "$INPUT_PREFIX" =~ ^[A-Z]+$ ]]; then
          echo "Error: 'prefix' may only contain uppercase letters (A-Z)."
          exit 1
        fi
        if [ -n "$INPUT_ACCESS_KEY_ID" ] && [ -z "$INPUT_SECRET_ACCESS_KEY" ]; then
          echo "Error: 'access_key_id' was provided but 'secret_access_key' is missing."
          exit 1
        fi
        if [ -n "$INPUT_SECRET_ACCESS_KEY" ] && [ -z "$INPUT_ACCESS_KEY_ID" ]; then
          echo "Error: 'secret_access_key' was provided but 'access_key_id' is missing."
          exit 1
        fi
        if [ -n "$INPUT_ACCESS_KEY_ID" ]; then
          export AWS_ACCESS_KEY_ID="$INPUT_ACCESS_KEY_ID"
          export AWS_SECRET_ACCESS_KEY="$INPUT_SECRET_ACCESS_KEY"
        fi
        if [ -n "$INPUT_SESSION_TOKEN" ]; then
          export AWS_SESSION_TOKEN="$INPUT_SESSION_TOKEN"
        fi
        echo "Collecting stack outputs from AWS Cloudformation"
        aws cloudformation describe-stacks --stack-name "${{ inputs.stack_name }}" --query 'Stacks[0].Outputs' --output json \
        | jq -r '.[] | "\(.OutputKey)=\(.OutputValue)"' \
        | while read line ; do
            if [[ -n "$INPUT_PREFIX" ]]; then
              line="${INPUT_PREFIX}_${line}"
            fi
            mask=$(cut -d "=" -f2- <<< $line) && echo "::add-mask::${mask}" && echo $line >> $GITHUB_ENV
          done
      env:
        INPUT_ACCESS_KEY_ID: ${{ inputs.access_key_id }}
        INPUT_SECRET_ACCESS_KEY: ${{ inputs.secret_access_key }}
        INPUT_SESSION_TOKEN: ${{ inputs.session_token }}
        INPUT_PREFIX: ${{ inputs.prefix }}
        AWS_DEFAULT_REGION: ${{ inputs.region }}
