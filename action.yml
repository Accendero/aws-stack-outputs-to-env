name: "AWS Stack Outputs to Env"
description: |
  Collect variables from specified stack outputs and export them to env vars

branding:
  icon: "settings"
  color: "orange"

inputs:
  access_key_id:
    description: "AWS Access Key ID (optional if an active AWS session is already configured, e.g. via OIDC)"
    required: false
  secret_access_key:
    description: "AWS Secret Access Key (optional if an active AWS session is already configured, e.g. via OIDC)"
    required: false
  session_token:
    description: "AWS Session Token (required when using temporary credentials, e.g. from STS or OIDC)"
    required: false
  region:
    description: "AWS Region"
    required: true
  stack_name:
    description: "Cloudformation Stack Name"
    required: true
  prefix:
    description: "Optional prefix for exported environment variable names. Must be uppercase letters and underscores only (e.g. MY_PREFIX exports MY_PREFIX_my_var)"
    required: false
  scope:
    description: "What to collect from the stack: 'Outputs' (default) or 'Parameters'"
    required: false
    default: "Outputs"

outputs:
  matrix:
    description: "JSON object of all collected stack outputs/parameters, keyed by name (with prefix applied if set)"
    value: ${{ steps.get_stack_outputs.outputs.matrix }}

runs:
  using: "composite"
  steps:
    - name: Get Stack Outputs
      id: get_stack_outputs
      shell: bash
      run: |
        if [ -n "$INPUT_PREFIX" ] && [[ ! "$INPUT_PREFIX" =~ ^[A-Z_]+$ ]]; then
          echo "Error: 'prefix' may only contain uppercase letters (A-Z) and underscores."
          exit 1
        fi
        if [[ "$INPUT_SCOPE" != "Outputs" && "$INPUT_SCOPE" != "Parameters" ]]; then
          echo "Error: 'scope' must be 'Outputs' or 'Parameters'."
          exit 1
        fi
        if [ -n "$INPUT_ACCESS_KEY_ID" ] && [ -z "$INPUT_SECRET_ACCESS_KEY" ]; then
          echo "Error: 'access_key_id' was provided but 'secret_access_key' is missing."
          exit 1
        fi
        if [ -n "$INPUT_SECRET_ACCESS_KEY" ] && [ -z "$INPUT_ACCESS_KEY_ID" ]; then
          echo "Error: 'secret_access_key' was provided but 'access_key_id' is missing."
          exit 1
        fi
        if [ -n "$INPUT_ACCESS_KEY_ID" ]; then
          export AWS_ACCESS_KEY_ID="$INPUT_ACCESS_KEY_ID"
          export AWS_SECRET_ACCESS_KEY="$INPUT_SECRET_ACCESS_KEY"
        fi
        if [ -n "$INPUT_SESSION_TOKEN" ]; then
          export AWS_SESSION_TOKEN="$INPUT_SESSION_TOKEN"
        fi
        if [[ "$INPUT_SCOPE" == "Parameters" ]]; then
          QUERY='Stacks[0].Parameters'
          JQ_EXPR='.[] | "\(.ParameterKey)=\(.ParameterValue)"'
          JSON_EXPR='[.[] | {key: .ParameterKey, value: .ParameterValue}] | from_entries'
        else
          QUERY='Stacks[0].Outputs'
          JQ_EXPR='.[] | "\(.OutputKey)=\(.OutputValue)"'
          JSON_EXPR='[.[] | {key: .OutputKey, value: .OutputValue}] | from_entries'
        fi
        echo "Collecting stack ${INPUT_SCOPE} from AWS Cloudformation"
        STACK_DATA=$(aws cloudformation describe-stacks --stack-name "${{ inputs.stack_name }}" --query "$QUERY" --output json)
        JSON=$(echo "$STACK_DATA" | jq -c "$JSON_EXPR")
        if [[ -n "$INPUT_PREFIX" ]]; then
          JSON=$(echo "$JSON" | jq -c --arg p "$INPUT_PREFIX" 'with_entries(.key = $p + "_" + .key)')
        fi
        echo "::add-mask::${JSON}"
        echo "matrix=${JSON}" >> $GITHUB_OUTPUT
        echo "$STACK_DATA" | jq -r "$JQ_EXPR" \
        | while read line ; do
            if [[ -n "$INPUT_PREFIX" ]]; then
              line="${INPUT_PREFIX}_${line}"
            fi
            mask=$(cut -d "=" -f2- <<< $line) && [ -n "$mask" ] && echo "::add-mask::${mask}"; echo $line >> $GITHUB_ENV
          done
      env:
        INPUT_ACCESS_KEY_ID: ${{ inputs.access_key_id }}
        INPUT_SECRET_ACCESS_KEY: ${{ inputs.secret_access_key }}
        INPUT_SESSION_TOKEN: ${{ inputs.session_token }}
        INPUT_PREFIX: ${{ inputs.prefix }}
        INPUT_SCOPE: ${{ inputs.scope }}
        AWS_DEFAULT_REGION: ${{ inputs.region }}

    - name: Debug Environment Variables
      if: ${{ runner.debug == '1' }}
      shell: bash
      run: |
        echo "🐛 Debug Environment Variables:\n"
        env

    - name: Debug Outputs
      if: ${{ runner.debug == '1' }}
      env:
        OUTPUTS: ${{ toJSON(steps.get_stack_outputs.outputs) }}
      shell: bash
      run: |
        echo "🐛 Debug Step Outputs:\n"
        echo "$OUTPUTS"
