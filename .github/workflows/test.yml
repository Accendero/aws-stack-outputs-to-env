name: Test Action

on:
  pull_request:
  workflow_dispatch:

jobs:
  test-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test - should fail with only access_key_id
        id: only-access-key
        continue-on-error: true
        uses: ./
        with:
          access_key_id: "test-key"
          region: us-east-1
          stack_name: "MyStack"

      - name: Verify validation failed for partial credentials (access_key only)
        run: |
          if [[ "${{ steps.only-access-key.outcome }}" == "success" ]]; then
            echo "::error::Should have failed with only access_key_id"
            exit 1
          fi
          echo "Validation correctly failed with only access_key_id"

      - name: Test - should fail with only secret_access_key
        id: only-secret-key
        continue-on-error: true
        uses: ./
        with:
          secret_access_key: "test-secret"
          region: us-east-1
          stack_name: "MyStack"

      - name: Verify validation failed for partial credentials (secret_key only)
        run: |
          if [[ "${{ steps.only-secret-key.outcome }}" == "success" ]]; then
            echo "::error::Should have failed with only secret_access_key"
            exit 1
          fi
          echo "Validation correctly failed with only secret_access_key"

      - name: Test - should fail with invalid prefix
        id: invalid-prefix
        continue-on-error: true
        uses: ./
        with:
          region: us-east-1
          stack_name: "MyStack"
          prefix: "invalid-prefix1"

      - name: Verify validation failed for invalid prefix
        run: |
          if [[ "${{ steps.invalid-prefix.outcome }}" == "success" ]]; then
            echo "::error::Should have failed with invalid prefix"
            exit 1
          fi
          echo "Validation correctly failed with invalid prefix"

      - name: Test - should fail with invalid scope
        id: invalid-scope
        continue-on-error: true
        uses: ./
        with:
          region: us-east-1
          stack_name: "MyStack"
          scope: "invalid-scope"

      - name: Verify validation failed for invalid scope
        run: |
          if [[ "${{ steps.invalid-scope.outcome }}" == "success" ]]; then
            echo "::error::Should have failed with invalid scope"
            exit 1
          fi
          echo "Validation correctly failed with invalid scope"

      - name: Test - should fail with invalid mask
        id: invalid-mask
        continue-on-error: true
        uses: ./
        with:
          region: us-east-1
          stack_name: "MyStack"
          mask: "yes"

      - name: Verify validation failed for invalid mask
        run: |
          if [[ "${{ steps.invalid-mask.outcome }}" == "success" ]]; then
            echo "::error::Should have failed with invalid mask"
            exit 1
          fi
          echo "Validation correctly failed with invalid mask"

  # Tests that outputs written by the action are accessible to the workflow that imports it.
  # Uses a mock AWS CLI so no real credentials are needed.
  # Run locally with: act pull_request -j test-imported-action-outputs
  test-imported-action-outputs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mock AWS CLI
        run: |
          mkdir -p /tmp/mock-aws-bin
          cat > /tmp/mock-aws-bin/aws << 'EOF'
          #!/bin/bash
          # Returns a fixed CloudFormation Outputs JSON array, ignoring all args
          echo '[{"OutputKey":"Foo","OutputValue":"bar"},{"OutputKey":"Baz","OutputValue":"qux"}]'
          EOF
          chmod +x /tmp/mock-aws-bin/aws
          echo "/tmp/mock-aws-bin" >> $GITHUB_PATH

      - name: Call action as though imported
        id: imported-action
        uses: ./
        with:
          region: us-east-1
          stack_name: MockStack

      - name: Verify action.yml declares outputs for importing workflows
        run: |
          # Composite actions must declare outputs in action.yml for them to be
          # accessible to importing workflows. act's runner incorrectly shares
          # $GITHUB_OUTPUT across composite steps and callers, so behavioral
          # assertions on steps.*.outputs.* pass locally even without declaration.
          # This structural check catches the real requirement.
          if ! grep -q "^outputs:" action.yml; then
            echo "::error::action.yml has no outputs: section"
            echo "Add an outputs: section to expose step outputs to importing workflows"
            exit 1
          fi
          echo "action.yml declares outputs"

      - name: Show all outputs visible to importing workflow
        run: |
          # NOTE: act incorrectly shares $GITHUB_OUTPUT with composite action steps,
          # so these values appear populated even without declaration in action.yml.
          # On real GitHub Actions runners this would be empty without an outputs: section.
          echo "Step outputs: ${{ steps.imported-action.outputs.matrix }}"

  # Tests that the Resources scope correctly maps LogicalResourceId -> PhysicalResourceId.
  # Uses a mock AWS CLI so no real credentials are needed.
  # Run locally with: act pull_request -j test-imported-action-outputs-resources
  test-imported-action-outputs-resources:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mock AWS CLI (describe-stack-resources)
        run: |
          mkdir -p /tmp/mock-aws-bin
          cat > /tmp/mock-aws-bin/aws << 'EOF'
          #!/bin/bash
          # Returns a fixed CloudFormation StackResources JSON array, ignoring all args
          echo '[{"LogicalResourceId":"MyBucket","PhysicalResourceId":"my-stack-mybucket-abc123"},{"LogicalResourceId":"MyFunction","PhysicalResourceId":"my-stack-MyFunction-XYZ789"}]'
          EOF
          chmod +x /tmp/mock-aws-bin/aws
          echo "/tmp/mock-aws-bin" >> $GITHUB_PATH

      - name: Call action with scope=Resources
        id: resources-action
        uses: ./
        with:
          region: us-east-1
          stack_name: MockStack
          scope: Resources

      - name: Verify env vars were exported with LogicalResourceId as name
        run: |
          if [[ -z "${MyBucket}" ]]; then
            echo "::error::Expected env var MyBucket to be set"
            exit 1
          fi
          if [[ "${MyBucket}" != "my-stack-mybucket-abc123" ]]; then
            echo "::error::Expected MyBucket=my-stack-mybucket-abc123, got ${MyBucket}"
            exit 1
          fi
          echo "MyBucket=${MyBucket}"
          echo "MyFunction=${MyFunction}"

      - name: Verify matrix output contains resource entries
        run: |
          MATRIX='${{ steps.resources-action.outputs.matrix }}'
          BUCKET=$(echo "$MATRIX" | jq -r '.MyBucket')
          if [[ "$BUCKET" != "my-stack-mybucket-abc123" ]]; then
            echo "::error::Expected matrix.MyBucket=my-stack-mybucket-abc123, got ${BUCKET}"
            exit 1
          fi
          echo "matrix output: $MATRIX"

  # Integration test - requires AWS credentials and an existing CloudFormation stack
  # Run with: act workflow_dispatch -j test-cfn-fetch --secret-file .secrets
  # This job only runs on workflow_dispatch (manual trigger)
  test-cfn-fetch:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Install AWS CLI
        run: |
          curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o awscliv2.zip
          unzip -q awscliv2.zip
          sudo ./aws/install --update
          rm -rf aws awscliv2.zip

      - name: Fetch stack outputs with credentials
        id: fetch-outputs
        uses: ./
        with:
          access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          session_token: ${{ secrets.AWS_SESSION_TOKEN }}
          region: ${{ secrets.AWS_REGION }}
          stack_name: ${{ secrets.STACK_NAME }}
          prefix: "TESTPREFIX"

      - name: Verify environment variables were set
        run: |
          PREFIX="${{ secrets.prefix }}_"
          MATCHES=$(env | grep "^${PREFIX}" | wc -l)
          if [[ "$MATCHES" -eq 0 ]]; then
            echo "::error::No environment variables with prefix '${PREFIX}' were exported"
            exit 1
          fi
          echo "Successfully exported ${MATCHES} variable(s) with prefix '${PREFIX}'"

      - name: Verify step outputs were set
        run: |
          OUTPUTS='${{ toJSON(steps.fetch-outputs.outputs) }}'
          MATCHES=$(echo "$OUTPUTS" | jq -r 'keys[]' | grep -c "^TESTPREFIX_")
          if [[ "$MATCHES" -eq 0 ]]; then
            echo "::error::No step outputs with prefix 'TESTPREFIX_' were found"
            exit 1
          fi
          echo "Successfully found ${MATCHES} output(s) with prefix 'TESTPREFIX_'"

      - name: Fetch stack parameters with credentials
        id: fetch-parameters
        uses: ./
        with:
          access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          session_token: ${{ secrets.AWS_SESSION_TOKEN }}
          region: ${{ secrets.AWS_REGION }}
          stack_name: ${{ secrets.STACK_NAME }}
          prefix: "PARAMPREFIX"
          scope: "Parameters"

      - name: Verify parameter environment variables were set
        run: |
          MATCHES=$(env | grep -c "^PARAMPREFIX_")
          if [[ "$MATCHES" -eq 0 ]]; then
            echo "::error::No environment variables with prefix 'PARAMPREFIX_' were exported"
            exit 1
          fi
          echo "Successfully exported ${MATCHES} parameter(s) with prefix 'PARAMPREFIX_'"

      - name: Verify parameter step outputs were set
        run: |
          OUTPUTS='${{ toJSON(steps.fetch-parameters.outputs) }}'
          MATCHES=$(echo "$OUTPUTS" | jq -r 'keys[]' | grep -c "^PARAMPREFIX_")
          if [[ "$MATCHES" -eq 0 ]]; then
            echo "::error::No step outputs with prefix 'PARAMPREFIX_' were found"
            exit 1
          fi
          echo "Successfully found ${MATCHES} output(s) with prefix 'PARAMPREFIX_'"

      - name: Fetch stack resources with credentials
        id: fetch-resources
        uses: ./
        with:
          access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          session_token: ${{ secrets.AWS_SESSION_TOKEN }}
          region: ${{ secrets.AWS_REGION }}
          stack_name: ${{ secrets.STACK_NAME }}
          prefix: "RESOURCEPREFIX"
          scope: "Resources"

      - name: Verify resource environment variables were set
        run: |
          MATCHES=$(env | grep -c "^RESOURCEPREFIX_")
          if [[ "$MATCHES" -eq 0 ]]; then
            echo "::error::No environment variables with prefix 'RESOURCEPREFIX_' were exported"
            exit 1
          fi
          echo "Successfully exported ${MATCHES} resource(s) with prefix 'RESOURCEPREFIX_'"

      - name: Verify resource step outputs were set
        run: |
          OUTPUTS='${{ toJSON(steps.fetch-resources.outputs) }}'
          MATCHES=$(echo "$OUTPUTS" | jq -r 'keys[]' | grep -c "^RESOURCEPREFIX_")
          if [[ "$MATCHES" -eq 0 ]]; then
            echo "::error::No step outputs with prefix 'RESOURCEPREFIX_' were found"
            exit 1
          fi
          echo "Successfully found ${MATCHES} output(s) with prefix 'RESOURCEPREFIX_'"
